apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kubeapp
  name: kubeapp
spec:
  replicas: 6
  selector:
    matchLabels:
      app: kubeapp
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0%
  template:
    metadata:
      labels:
        app: kubeapp
    spec:
      containers:
        - image: kiran2361993/kubegame:v2
          name: kubegame
