apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-tools
  namespace: production
  labels:
    env: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: troubleshooting
      env: prod
  template:
    metadata:
      labels:
        app: troubleshooting
        env: prod
    spec:
      containers:
        - name: tools
          image: ankit2507/troubleshooting:v1
