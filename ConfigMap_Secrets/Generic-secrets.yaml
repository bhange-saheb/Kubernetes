apiVersion: v1
kind: Secret
metadata:
  name: aws-access-keys
type: Opaque
data:
  AWS_ACCESS_KEY_ID: ACCESSKEYHERE
  AWS_SECRET_ACCESS_KEY: SECRETEKEYHERE

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: testapp1
  name: testapp1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testapp1
  template:
    metadata:
      labels:
        app: testapp1
    spec:
      containers:
        - image: ankit2507/troubleshooting:v1
          name: troubleshootingtools
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: aws-access-keys
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: aws-access-keys
            key: AWS_SECRET_ACCESS_KEY
      - name: AWS_DEFAULT_REGION
        value: "us-east-1"
